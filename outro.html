<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grão Mestre | Alto Padrão</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f8f8;
            color: #111;
            margin: 0;
            overflow-x: hidden;
        }

        /* Efeito de texto vazado suave */
        .text-outline {
            color: transparent;
            -webkit-text-stroke: 1px #333;
        }

        /* Otimização de performance para as animações de blur */
        .hero-anim {
            will-change: transform, opacity, filter;
        }

        /* Esconde a barra de rolagem */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full flex justify-between items-center px-8 py-6 z-50 mix-blend-difference text-white">
        <div class="flex items-center gap-2 font-bold text-lg tracking-tighter">
            <div class="w-6 h-6 bg-white rounded-sm flex items-center justify-center text-black text-xs">☕</div>
            GRÃO MESTRE
        </div>
        <div class="hidden md:flex gap-8 text-xs font-semibold tracking-widest uppercase text-gray-300">
            <a href="#" class="hover:text-white transition-colors">Origem</a>
            <a href="#" class="hover:text-white transition-colors">Torra</a>
            <a href="#" class="hover:text-white transition-colors">Assinatura</a>
        </div>
        <div>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero-container" class="relative h-screen w-full flex items-center overflow-hidden">

        <!-- Canvas Background (Substituindo o vídeo) -->
        <canvas id="hero-canvas" class="absolute top-0 left-0 w-full h-full z-0 opacity-40 object-cover"></canvas>

        <!-- Main Content -->
        <div class="content-layer relative z-10 container mx-auto px-8 md:px-16 lg:px-24 w-full flex justify-between items-center pt-24">

            <!-- Left Column: Typography & Buttons -->
            <div class="max-w-lg"> <!-- Largura reduzida para condensar à esquerda -->
                <h1 class="text-5xl md:text-6xl lg:text-7xl font-medium leading-[1.05] tracking-tight mb-6 text-gray-900">
                    <div class="hero-anim inline-block">A essência do</div><br>
                    <div class="hero-anim inline-block text-outline">Grão Mestre</div><br>
                    <div class="hero-anim inline-block">em cada xícara.</div>
                </h1>

                <p class="hero-anim text-base md:text-lg text-gray-500 mb-10 max-w-md leading-relaxed font-light">
                    Redefinimos o equilíbrio entre aroma, corpo e acidez. Feito para paladares que exigem a perfeição da torra artesanal em cada extração.
                </p>

                <div class="flex items-center gap-4">
                    <a href="#" class="hero-anim bg-[#111] text-white px-7 py-3.5 rounded-full text-sm font-medium hover:bg-gray-800 transition-colors">
                        Fazer Pedido
                    </a>
                    <a href="#" class="hero-anim bg-white text-black px-7 py-3.5 rounded-full text-sm font-medium shadow-sm border border-gray-200 hover:bg-gray-50 transition-colors flex items-center gap-2">
                        Explorar <span class="text-gray-400">↓</span>
                    </a>
                </div>
            </div>

            <!-- Right Column: Pagination Indicator -->
            <div class="hero-anim hidden lg:flex flex-col items-center gap-4 text-xs font-medium text-gray-400">
                <span>01</span>
                <div class="w-[1px] h-12 bg-gray-300"></div>
            </div>
        </div>

        <!-- Bottom Scroll Indicator -->
        <div class="hero-anim absolute bottom-8 left-1/2 transform -translate-x-1/2 flex flex-col items-center gap-3 text-[10px] font-semibold tracking-widest uppercase text-gray-400 z-10">
            SCROLL TO EXTRACT
            <div class="w-[1px] h-8 bg-gray-300"></div>
        </div>
    </section>

    <!-- Próxima Seção -->
    <section class="h-screen bg-white flex items-center justify-center relative z-20">
        <h2 class="text-3xl font-light text-gray-400">A jornada continua...</h2>
    </section>

    <!-- GSAP & ScrollTrigger Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // ========================
        // 1. ANIMAÇÕES DE TEXTO (LOAD E SCROLL)
        // ========================

        // Animação de Entrada (Load)
        const loadTl = gsap.timeline();
        loadTl.fromTo(".hero-anim", 
            { y: 40, opacity: 0, filter: "blur(12px)" },
            { y: 0, opacity: 1, filter: "blur(0px)", duration: 1.2, stagger: 0.12, ease: "power3.out", delay: 0.2 }
        );

        // Animação de Saída (Scroll) - Efeito reverso ao rolar para baixo
        gsap.to(".hero-anim", {
            y: -50,
            opacity: 0,
            filter: "blur(12px)",
            stagger: 0.08,
            ease: "power2.inOut",
            scrollTrigger: {
                trigger: "#hero-container",
                start: "top top",
                end: "+=800", // Os textos somem nos primeiros 800px de scroll
                scrub: 1,
            }
        });

        // ========================
        // 2. SISTEMA DE CANVAS OTIMIZADO
        // ========================
        const canvas = document.getElementById("hero-canvas");
        const ctx = canvas.getContext("2d", { alpha: false });

        const FRAME_COUNT = 240;
        const images = [];
        const imageSeq = { frame: 0 };
        let imagesLoaded = 0;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            render();
        }

        function drawImageCover(img) {
            const canvasWidth = canvas.clientWidth;
            const canvasHeight = canvas.clientHeight;
            const scale = Math.max(canvasWidth / img.width, canvasHeight / img.height);
            const x = (canvasWidth - img.width * scale) / 2;
            const y = (canvasHeight - img.height * scale) / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
        }

        function render() {
            const frameIndex = Math.min(Math.max(Math.floor(imageSeq.frame), 0), FRAME_COUNT - 1);
            const img = images[frameIndex];
            if (!img || !img.complete) return;
            drawImageCover(img);
        }

        function preloadFrames() {
            for (let i = 1; i <= FRAME_COUNT; i++) {
                const img = new Image();
                const frameNum = String(i).padStart(4, "0");
                img.src = `frames/frame_${frameNum}.webp`; // Caminho ajustado conforme sua instrução
                img.loading = "eager";

                img.onload = () => {
                    imagesLoaded += 1;
                    if (imagesLoaded === 1) render();
                };
                images.push(img);
            }
        }

        resizeCanvas();
        preloadFrames();
        window.addEventListener("resize", resizeCanvas);

        // ========================
        // 3. SCROLLTRIGGER DO CANVAS
        // ========================
        let frameTween;

        gsap.to({ progress: 0 }, {
            progress: 1,
            ease: "none",
            scrollTrigger: {
                trigger: "#hero-container",
                start: "top top",
                end: "+=3000", // Duração total do pin para rodar os 240 frames
                scrub: 0.5,
                pin: true,
                onUpdate(self) {
                    const targetFrame = (FRAME_COUNT - 1) * self.progress;
                    if (frameTween) frameTween.kill();

                    frameTween = gsap.to(imageSeq, {
                        frame: targetFrame,
                        duration: 0.5, // Suaviza a transição entre os frames
                        ease: "power3.out",
                        onUpdate: render,
                    });
                }
            }
        });
    </script>
</body>
</html>
